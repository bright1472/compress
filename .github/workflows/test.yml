name: test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  exif-and-metadata:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Z
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Z/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
